<meta charset="UTF-8">

<title>Ghost Flight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height:100%; overflow:hidden; touch-action:none;
    background: #0d0d1a;
    font-family:'Baloo 2', sans-serif;
  }
  #wrap {
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas {
    display:block;
    width:100%; height:100%;
    touch-action:none;
    -ms-touch-action:none;
    background: linear-gradient(180deg, #050a12 0%, #0c1a24 35%, #16332e 70%, #1f2e1a 100%);
  }
  #hud {
    position:absolute; top:0; left:0; width:100%;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: 18px 20px; pointer-events:none; z-index:30;
  }
  #score {
    font-family:'Cinzel', serif;
    font-size: 28px; font-weight:700;
    color: #b6f7d8;
    text-shadow: 0 0 10px rgba(182,247,216,0.6), 0 2px 4px rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }
  #best {
    font-size: 13px; color: #8fa8a0; opacity:0.85;
    margin-top:4px; letter-spacing:0.5px;
  }
  #combo {
    font-size: 13px; color: #c9a6ff; opacity:0; transition: opacity 0.2s;
    margin-top:2px; font-weight:700;
  }
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background: radial-gradient(ellipse at center, rgba(10,20,18,0.75) 0%, rgba(4,8,10,0.94) 100%);
    z-index:10; padding: 30px;
  }
  .title {
    font-family:'Cinzel', serif;
    font-size: 42px; font-weight:700; color:#b6f7d8;
    text-shadow: 0 0 24px rgba(182,247,216,0.5);
    letter-spacing:2px; margin-bottom:6px;
  }
  .subtitle {
    color:#8fa8a0; font-size:15px; margin-bottom:28px; max-width:280px; line-height:1.5;
  }
  .instructions {
    color:#d7e8e2; font-size:14px; line-height:1.9; margin-bottom:30px; max-width:290px;
  }
  .instructions b { color:#b6f7d8; }
  .btn {
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:18px;
    background: linear-gradient(180deg, #8fe6c4, #4a9d82);
    color: #0a1512; border:none; padding: 14px 38px; border-radius: 30px;
    box-shadow: 0 4px 0 #2d6350, 0 8px 18px rgba(0,0,0,0.5);
    cursor:pointer; letter-spacing:0.5px;
    transition: transform 0.08s ease;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #2d6350, 0 4px 10px rgba(0,0,0,0.5); }
  .btn-secondary {
    background: linear-gradient(180deg, #3a4a45, #26332e);
    color: #d7e8e2;
    box-shadow: 0 4px 0 #16211d, 0 8px 18px rgba(0,0,0,0.5);
  }
  .btn-secondary:active { box-shadow: 0 1px 0 #16211d, 0 4px 10px rgba(0,0,0,0.5); }
  .gameover-title {
    font-family:'Cinzel', serif; font-size:32px; color:#c9a6ff;
    text-shadow: 0 0 18px rgba(201,166,255,0.5); margin-bottom:8px; letter-spacing:1px;
  }
  .stat-row {
    display:flex; gap: 30px; margin: 18px 0 30px 0;
  }
  .stat { text-align:center; }
  .stat-num { font-family:'Cinzel', serif; font-size:26px; color:#b6f7d8; }
  .stat-label { font-size:11px; color:#8fa8a0; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .hidden { display:none !important; }
  .flip-flash {
    position:absolute; inset:0; background:#b6f7d8; opacity:0; pointer-events:none; z-index:4;
  }
  #settingsBtn {
    pointer-events:auto;
    width:42px; height:42px; border-radius:50%;
    background: rgba(8,16,14,0.6); border:1px solid rgba(182,247,216,0.4);
    color:#b6f7d8; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #settingsPanel { z-index:20; }
  .setting-row {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    width:100%; max-width:300px; margin:10px 0; color:#d7e8e2; font-size:14px;
  }
  .setting-row input[type="range"] { width:140px; accent-color:#8fe6c4; }
  .setting-row input[type="checkbox"] { width:20px; height:20px; accent-color:#8fe6c4; }

<script>
(function(){
  const canvas = document.getElementById('game');

  const bestEl = document.getElementById('best');
  const comboEl = document.getElementById('combo');

  const overScreen = document.getElementById('overScreen');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const exitBtn = document.getElementById('exitBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalBestEl = document.getElementById('finalBest');
  const settingsBtn = document.getElementById('settingsBtn');

  const closeSettingsBtn = document.getElementById('closeSettingsBtn');

  const challengeHot = document.getElementById('challengeHot');
  const rateHot = document.getElementById('rateHot');
  const skinsHot = document.getElementById('skinsHot');
  const leaderHot = document.getElementById('leaderHot');
  const shopHot = document.getElementById('shopHot');
  const shareHot = document.getElementById('shareHot');
  const continueBox = document.getElementById('continueBox');
  const continueAdBtn = document.getElementById('continueAdBtn');
  const skipContinueBtn = document.getElementById('skipContinueBtn');
  const finalGameActions = document.getElementById('finalGameActions');
  const achievementPop = document.getElementById('achievementPop');

  // Firebase worldwide leaderboard
  // Offline-safe init: if the three Firebase SDK <script> tags above fail to load
  // (e.g. no network on first offline launch of the packaged APK), the global
  // `firebase` object won't exist. Everything below is guarded so a missing
  // SDK/network NEVER throws and NEVER blocks the rest of the game from starting —
  // it just makes the leaderboard report itself unavailable, exactly like the
  // existing "NO INTERNET CONNECTION" / "LEADERBOARD UNAVAILABLE" states already
  // handle a dropped connection.
  const firebaseConfig = {
    apiKey: "AIzaSyDJ7URy7BT4li54E4i0Qle75eDBgJgBnMY",
    authDomain: "ghost-flight-d4019.firebaseapp.com",
    projectId: "ghost-flight-d4019",
    storageBucket: "ghost-flight-d4019.firebasestorage.app",
    messagingSenderId: "267763593339",
    appId: "1:267763593339:web:3173100ddf63e54eb8b2de",
    measurementId: "G-YEE5JXXG3J"
  };
  let auth = null, db = null, firebaseAvailable = false;
  try{
    if(typeof firebase !== 'undefined'){
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      firebaseAvailable = true;
    }
  }catch(e){
    auth = null; db = null; firebaseAvailable = false;
  }
  let firebaseUser = null;
  const firebaseReady = firebaseAvailable
    ? auth.signInAnonymously().then(c=>{ firebaseUser=c.user; return c.user; }).catch(err=>{ console.warn('Firebase auth unavailable',err); return null; })
    : Promise.resolve(null);

  let challengeMode = false;
  let challengeLevel = 1, challengePassed = 0, challengeTarget = 0;
  let unlockedLevel = Math.max(1, Math.min(50, Number(localStorage.getItem('ghostFlightUnlockedLevel') || 1)));
  const challengeProgress = document.getElementById('challengeProgress');
  let player;
  try { player = JSON.parse(localStorage.getItem('ghostFlightPlayer') || '{}') || {}; } catch(e){ player={}; }
  player.name=(String(player.name||'GhostRider').trim()||'GhostRider').slice(0,16);
  player.avatar=player.avatar||'👻'; player.skin=player.skin||'mint'; player.coins=Number(player.coins||0);
  player.skinExpiries=player.skinExpiries&&typeof player.skinExpiries==='object'?player.skinExpiries:{};
  const achievements=new Set((()=>{try{return JSON.parse(localStorage.getItem('ghostFlightAchievements')||'[]')}catch(e){return[]}})());
  let achievementTimer=null;
  let achievementUIArmed=false;
  ['pointerdown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,()=>{achievementUIArmed=true;},{once:true,passive:true}));
  achievementPop.classList.remove('show'); achievementPop.textContent='';
  function unlockAchievement(id,label){
    if(achievements.has(id)) return;
    achievements.add(id); localStorage.setItem('ghostFlightAchievements',JSON.stringify([...achievements]));
    if(!achievementUIArmed) return;
    achievementPop.textContent='🏆 '+label+' UNLOCKED';
    achievementPop.classList.add('show'); clearTimeout(achievementTimer);
    achievementTimer=setTimeout(()=>achievementPop.classList.remove('show'),2600);
  }

  function savePlayer(){ localStorage.setItem('ghostFlightPlayer', JSON.stringify(player)); }
  function tapFx(el){ el.classList.remove('tap-pop'); void el.offsetWidth; el.classList.add('tap-pop'); }
  function closeMenuPanel(){ menuPanel.classList.add('hidden'); }
  function openPanel(title, body){
    menuPanelCard.innerHTML = '<div class="panel-title">'+title+'</div>'+body+'<div class="panel-actions"><button class="btn" id="panelClose">DONE</button></div>';
    menuPanel.classList.remove('hidden');
    document.getElementById('panelClose').onclick = closeMenuPanel;
  }
  function openProfile(){
    const avatars=['👻','💀','🧙','🦇','🎃','😈'];
    openPanel('PLAYER PROFILE','<input class="game-input" id="nameEdit" maxlength="16" value="'+player.name.replace(/"/g,'&quot;')+'"><div class="avatar-grid">'+avatars.map(a=>'<button class="avatar '+(a===player.avatar?'selected':'')+'" data-avatar="'+a+'">'+a+'</button>').join('')+'</div><div class="small-label">Choose avatar and change your game username.</div>');
    document.querySelectorAll('[data-avatar]').forEach(b=>b.onclick=()=>{ player.avatar=b.dataset.avatar; profileBtn.textContent=player.avatar; savePlayer(); openProfile(); });
    document.getElementById('nameEdit').onchange=e=>{ player.name=(e.target.value.trim()||'GhostRider').slice(0,16); savePlayer(); syncGlobalScore(); };
  }
  const skinCatalog=[
    {id:'mint',name:'Mint Spirit',rarity:'common',base:true},
    {id:'violet',name:'Violet Soul',rarity:'common'},
    {id:'pumpkin',name:'Pumpkin Ghost',rarity:'common'},
    {id:'fire',name:'Fire Wraith',rarity:'rare'},
    {id:'ice',name:'Ice Phantom',rarity:'rare'},
    {id:'shadow',name:'Shadow Soul',rarity:'rare'},
    {id:'toxic',name:'Toxic Spirit',rarity:'rare'},
    {id:'storm',name:'Storm Specter',rarity:'epic'},
    {id:'galaxy',name:'Galaxy Wraith',rarity:'epic'},
    {id:'crystal',name:'Crystal Phantom',rarity:'epic'},
    {id:'royal',name:'Ghost King',rarity:'legendary'}
  ];
  function skinPreview(sk){
    return '<div class="skin-preview"><div class="mini-ghost '+sk.id+'">'+(sk.id==='royal'?'<i class="skin-crown"></i>':'')+'</div></div>';
  }
  let pendingReward=null;
  let continueUsed=false, pendingDeathSnapshot=null, reviveShieldUntil=0;

  function fmtRemaining(ms){ if(ms<=0)return ''; const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000); return h+'h '+m+'m remaining'; }
  function skinActive(sk){
    if(sk.base) return true;
    const exp=Number(player.skinExpiries[sk.id]||0);
    return exp>Date.now();
  }
  function validateSelectedSkin(){
    const sk=skinCatalog.find(x=>x.id===player.skin)||skinCatalog[0];
    if(!skinActive(sk)){ player.skin='mint'; savePlayer(); }
  }
  function showRewardedAd(placement,onReward,onUnavailable){
    let settled=false;
    const reward=()=>{if(settled)return;settled=true;onReward&&onReward();};
    const unavailable=()=>{if(settled)return;settled=true;onUnavailable&&onUnavailable();};
    try{
      if(window.GhostFlightAds&&typeof window.GhostFlightAds.showRewarded==='function'){
        window.__ghostFlightRewardCallback=reward;
        window.__ghostFlightAdUnavailable=unavailable;
        window.GhostFlightAds.showRewarded(placement);
      }else if(AD_TEST_MODE){
        setTimeout(reward,500);
      }else unavailable();
    }catch(e){ unavailable(); }
  }
  window.ghostFlightRewardGranted=()=>window.__ghostFlightRewardCallback&&window.__ghostFlightRewardCallback();
  window.ghostFlightRewardUnavailable=()=>window.__ghostFlightAdUnavailable&&window.__ghostFlightAdUnavailable();
  function openSkins(){ validateSelectedSkin();
    const now=Date.now();
    const html='<div class="small-label">Common, Rare and Epic: rewarded access for 24 hours. Legendary: complete Level 35, then rewarded access for 12 hours.</div><div class="skin-grid">'+skinCatalog.map(sk=>{
      const active=skinActive(sk), exp=Number(player.skinExpiries[sk.id]||0), legendaryLocked=sk.rarity==='legendary'&&unlockedLevel<36;
      let status=active?'SELECT':(legendaryLocked?'🔒 COMPLETE LEVEL 35':'🎬 WATCH AD');
      if(active&&!sk.base&&exp>now) status=fmtRemaining(exp-now);
      return '<button class="skin-item rarity-'+sk.rarity+' '+(player.skin===sk.id?'selected':'')+'" data-skin="'+sk.id+'">'+skinPreview(sk)+'<span class="small-label">'+sk.name+'<br>'+sk.rarity.toUpperCase()+'<br>'+status+'</span></button>';
    }).join('')+'</div>';
    openPanel('GHOST SKINS',html);
    document.querySelectorAll('[data-skin]').forEach(b=>b.onclick=()=>{
      const sk=skinCatalog.find(x=>x.id===b.dataset.skin); if(!sk)return;
      if(skinActive(sk)){player.skin=sk.id;savePlayer();unlockAchievement('skin_collector','SKIN COLLECTOR');openSkins();return;}
      if(sk.rarity==='legendary'&&unlockedLevel<36){openPanel('LEGENDARY LOCKED','<div style="font-size:52px">👑🔒</div><div class="small-label">Complete Challenge Level 35 to unlock Legendary access.</div>');return;}
      requestRewardedSkin(sk);
    });
  }
  function requestRewardedSkin(sk){
    const hours=sk.rarity==='legendary'?12:24;
    showRewardedAd('skin_'+sk.rarity,()=>{
      player.skinExpiries[sk.id]=Date.now()+hours*3600000; player.skin=sk.id; savePlayer();
      openSkins();
    },()=>openPanel('REWARDED AD UNAVAILABLE','<div style="font-size:48px">📡</div><div class="small-label">Rewarded ad unavailable. Please try again later.</div>'));

  function levelConfig(level){
    const band=Math.floor((level-1)/5);
    const target=level<=10?15:level<=20?20:level<=30?25:level<=40?30:level<=45?35:Math.min(40,35+(level-45));
    return {target, speed:2.55+level*0.035, gap:Math.max(136,220-level*1.55), spacing:Math.max(270,355-level*1.45), moveChance:Math.min(.58,Math.max(0,(level-12)*.014)), moveAmp:Math.min(34,8+band*3)};
  }

      });

  }

  let W, H, DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const mobileWideView = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
    W = canvas.clientWidth * (mobileWideView ? 1.15 : 1); H = canvas.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let bestScore = Number(localStorage.getItem('ghostFlightBest') || 0);

  // ---------- audio engine (fully procedural, no external files) ----------
  const audio = {
    ctx: null, master: null, musicGain: null, sfxGain: null,
    musicOn: true, sfxOn: true,
    musicTimer: null, musicStep: 0
  };
  audio.musicOn=localStorage.getItem('ghostFlightMusicOn')!=='0'; audio.sfxOn=localStorage.getItem('ghostFlightSfxOn')!=='0';
  musicToggle.checked=audio.musicOn; sfxToggle.checked=audio.sfxOn;

  function initAudio(){
    if(audio.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audio.ctx = new AC();
    audio.master = audio.ctx.createGain();
    audio.master.gain.value = 1;
    audio.master.connect(audio.ctx.destination);
    audio.musicGain = audio.ctx.createGain();
    audio.musicGain.gain.value = 0.55;
    audio.musicGain.connect(audio.master);
    audio.sfxGain = audio.ctx.createGain();
    audio.sfxGain.gain.value = 0.75;
    audio.sfxGain.connect(audio.master);
  }

  function tone(freq, dur, gainNode, type, startDelay, peak){
    if(!audio.ctx) return;
    const t0 = audio.ctx.currentTime + (startDelay||0);
    const osc = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak!==undefined?peak:0.22, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(g); g.connect(gainNode);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }

  // eerie horror-style loop: low drone + dissonant, irregular high notes
  const MUSIC_SCALE = [233.1, 220.0, 246.9, 207.7, 233.1, 195.9, 220.0, 174.6]; // dissonant minor cluster, semitone-ish clashes
  let droneOsc = null, droneGain = null;
  function startDrone(){
    if(droneOsc || !audio.ctx) return;
    droneOsc = audio.ctx.createOscillator();
    droneGain = audio.ctx.createGain();
    droneOsc.type = 'sawtooth';
    droneOsc.frequency.value = 58; // deep sub rumble
    droneGain.gain.value = 0.06;
    droneOsc.connect(droneGain);
    droneGain.connect(audio.musicGain);
    droneOsc.start();
    // slow detuned wobble for unease
    const lfo = audio.ctx.createOscillator();
    const lfoGain = audio.ctx.createGain();
    lfo.frequency.value = 0.13;
    lfoGain.gain.value = 4;
    lfo.connect(lfoGain);
    lfoGain.connect(droneOsc.frequency);
    lfo.start();
    droneOsc._lfo = lfo;
  }
  function stopDrone(){
    if(droneOsc){
      try{ droneOsc.stop(); droneOsc._lfo.stop(); }catch(e){}
      droneOsc = null; droneGain = null;
    }
  }
  function scheduleMusic(){
    if(!audio.musicOn || !audio.ctx) return;
    const note = MUSIC_SCALE[audio.musicStep % MUSIC_SCALE.length];
    const wobble = (Math.random()-0.5)*6;
    tone(note + wobble, 1.1, audio.musicGain, 'sine', 0, 0.1);
    if(audio.musicStep % 3 === 0){
      tone(note*2.01, 0.6, audio.musicGain, 'triangle', 0.15, 0.05); // slightly detuned octave = unsettling
    }
    audio.musicStep++;
    const nextDelay = 520 + Math.random()*260; // irregular timing feels uneasy
    audio.musicTimer = setTimeout(scheduleMusic, nextDelay);
  }
  function startMusic(){
    initAudio();
    if(audio.ctx.state === 'suspended') audio.ctx.resume();
    startDrone();
    if(audio.musicTimer) return;
    audio.musicStep = 0;
    scheduleMusic();
  }
  function stopMusic(){
    if(audio.musicTimer){ clearTimeout(audio.musicTimer); audio.musicTimer = null; }
    stopDrone();
  }

  function sfxFlap(){
    if(!audio.sfxOn || !audio.ctx) return;
    tone(520, 0.12, audio.sfxGain, 'sine', 0, 0.18);
  }
  function sfxEmber(){
    if(!audio.sfxOn || !audio.ctx) return;
    tone(880, 0.15, audio.sfxGain, 'triangle', 0, 0.2);
    tone(1180, 0.18, audio.sfxGain, 'triangle', 0.06, 0.15);
  }
  function sfxCrash(){
    if(!audio.sfxOn || !audio.ctx) return;
    tone(180, 0.35, audio.sfxGain, 'sawtooth', 0, 0.25);
    tone(90, 0.5, audio.sfxGain, 'square', 0.05, 0.2);
  }
  function sfxLaugh(){
    if(!audio.sfxOn || !audio.ctx) return;
    // several distinct laugh melodies picked at random, so repeats don't sound identical
    const patterns = [
      [260,242,224,206],           // descending "ha-ha-ha-ha"
      [220,260,200,250,190],       // wobbly mocking laugh
      [300,300,220,220,300],       // "ha-ha, ha-ha, ha"
      [180,210,180,210,180,210],   // fast snicker
      [340,300,260,220,180]        // long descending cackle
    ];
    const pattern = patterns[Math.floor(Math.random()*patterns.length)];
    pattern.forEach((freq, i)=>{
      tone(freq, 0.13, audio.sfxGain, 'square', 0.45 + i*0.15, 0.17);
    });
  }

  const TAUNTS = [
    "You couldn't cross this. Try again!",
    "Ha ha ha! Is that all you've got?",
    "So close, yet so far. Beat it this time!",
    "The flame went out. Prove you're better!",
    "Not good enough. One more try!",
    "Ha ha ha! Pathetic attempt!",
    "You call that flying? Try harder!",
    "Ha ha! Better luck next time, champion!",
    "Weak. Absolutely weak. Go again!",
    "Ha ha ha ha! You got destroyed!",
    "Come on, even a beginner can do better!",
    "Ha ha! Was that your best shot?",
    "Extinguished again. Are you even trying?",
    "Ha ha ha! Keep practicing, rookie!",
    "That was embarrassing. One more round!"
  ];
  let englishVoice = null;
  function pickEnglishVoice(){
    if(!('speechSynthesis' in window)) return;
    const voices = window.speechSynthesis.getVoices();
    if(!voices || !voices.length) return;
    englishVoice = voices.find(v => /en-US|en_US/i.test(v.lang)) ||
                   voices.find(v => /^en/i.test(v.lang)) ||
                   voices[0];
  }
  if('speechSynthesis' in window){
    pickEnglishVoice();
    window.speechSynthesis.onvoiceschanged = pickEnglishVoice;
  }
  let speechUnlocked = false;
  function unlockSpeech(){
    if(speechUnlocked || !('speechSynthesis' in window)) return;
    speechUnlocked = true;
    try{
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0;
      window.speechSynthesis.speak(warm);
    }catch(e){ /* ignore */ }
  }
  let lastTauntIndex=-1;
  function stopTaunt(){ if('speechSynthesis' in window){try{window.speechSynthesis.cancel();}catch(e){}} }
  function speakTaunt(){
    if(!audio.sfxOn) return;
    if(!('speechSynthesis' in window)) return;
    try{
      stopTaunt();
      let idx=Math.floor(Math.random()*TAUNTS.length); if(idx===lastTauntIndex) idx=(idx+1)%TAUNTS.length; lastTauntIndex=idx;
      const phrase = TAUNTS[idx];
      const utter = new SpeechSynthesisUtterance(phrase);
      utter.lang = 'en-US';
      if(englishVoice) utter.voice = englishVoice;
      utter.rate = 1.0;
      utter.pitch = 0.85;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
    }catch(e){ /* speech synthesis unavailable, fail silently */ }
  }

  const IS_MOBILE_GAME = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
  const FLAME_X_RATIO = IS_MOBILE_GAME ? 0.20 : 0.28;
  // Mobile-only flight tuning: softer gravity and tap impulse for a smooth arc.
  // Desktop values are intentionally preserved exactly.
  const GRAVITY = IS_MOBILE_GAME ? 0.28 : 0.45;
  const FLAP_IMPULSE = IS_MOBILE_GAME ? -5.6 : -7.8; // upward kick on tap
  const MAX_FALL = IS_MOBILE_GAME ? 6.5 : 9;
  const MAX_RISE = IS_MOBILE_GAME ? -6.5 : -9;
  const PILLAR_GAP_BASE = 205;
  const PILLAR_W = 62;
  const EMBER_R = 9;

  // difficulty/weather stages, unlocked gradually as score climbs
  function getStage(s){
    if(s >= 420) return 3; // storm — lightning, tightest gaps, moving pillars common
    if(s >= 220) return 2; // rain — moving pillars begin
    if(s >= 80)  return 1; // windy fog — gaps start tightening
    return 0;              // calm graveyard night
  }

  let state = 'start'; // start | playing | over
  let paused = false;
  let flame, pillars, embers, particles, trail;
  let baseSpeed, speed, distance, score, comboCount, comboTimer, spawnTimer, elapsed, lastGapCenter;

  function reset(){
    flame = {
      x: W * FLAME_X_RATIO,
      y: H/2,
      r: 15,
      vy: 0,
      angle: 0
    };
    pillars = [];
    embers = [];
    particles = [];
    trail = [];
    baseSpeed = challengeMode ? levelConfig(challengeLevel).speed : 2.9;
    speed = baseSpeed;
    distance = 0;
    score = 0;
    comboCount = 0;
    comboTimer = 0;
    spawnTimer = 0;
    elapsed = 0;
    lastGapCenter = H/2;
    challengePassed = 0; challengeTarget = challengeMode ? levelConfig(challengeLevel).target : 0;
    challengeProgress.textContent = challengeMode ? ('LEVEL '+challengeLevel+' • 0/'+challengeTarget) : '';
    challengeProgress.classList.toggle('hidden', !challengeMode);
    spawnPillar(W + 40);
  }

  function spawnPillar(xPos){
    const stage = getStage(score);
    const gapFloor = stage >= 3 ? 132 : (stage >= 2 ? 142 : 150);
    const gap = challengeMode ? levelConfig(challengeLevel).gap : Math.max(PILLAR_GAP_BASE - Math.min(score/6, 65), gapFloor);
    const margin = 70;
    let gapCenter = margin + Math.random() * (H - margin*2);
    // constrain how far the gap can jump from the previous pillar's gap,
    // so it's always physically reachable — risky, never impossible
    const maxJump = Math.min(H * 0.34, gap * 1.15);
    gapCenter = Math.max(lastGapCenter - maxJump, Math.min(lastGapCenter + maxJump, gapCenter));
    gapCenter = Math.max(margin, Math.min(H - margin, gapCenter));
    lastGapCenter = gapCenter;
    const hasEmber = Math.random() < 0.65;

    // moving pillars unlock gradually — a new difficulty layer, not just raw speed
    const moveChance = challengeMode ? levelConfig(challengeLevel).moveChance : (stage >= 3 ? 0.55 : (stage >= 2 ? 0.3 : 0));
    const moving = Math.random() < moveChance;
    const moveAmp = moving ? (challengeMode ? levelConfig(challengeLevel).moveAmp : Math.min(gap * 0.28, 34)) : 0;
    const moveSpeed = 0.02 + Math.random()*0.015;

    pillars.push({
      x: xPos,
      baseGapCenter: gapCenter,
      gapCenter,
      gap,
      passed: false,
      moving,
      moveAmp,
      moveSpeed,
      movePhase: Math.random()*Math.PI*2
    });
    if(hasEmber){
      embers.push({
        x: xPos + PILLAR_W/2 + 60 + Math.random()*40,
        y: gapCenter + (Math.random()-0.5)*gap*0.5,
        r: EMBER_R,
        collected: false,
        pulse: Math.random()*Math.PI*2
      });
    }
  }

  function addParticles(x,y,color,count){
    for(let i=0;i<count;i++){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*4,
        vy: (Math.random()-0.5)*4,
        life: 1,
        color
      });
    }
  }

  function flap(){
    if(state === 'start'){ startGame(); return; }
    if(state === 'over') return;
    flame.vy = FLAP_IMPULSE;
    flash.style.transition = 'opacity 0.12s';
    flash.style.opacity = '0.14';
    setTimeout(()=> flash.style.opacity = '0', 110);
    addParticles(flame.x, flame.y + flame.r, '#b6f7d8', 5);
    sfxFlap();
  }

  function startGame(){
    unlockSpeech(); initAudio(); if(audio.ctx&&audio.ctx.state==='suspended') audio.ctx.resume(); stopTaunt();
    if(challengeMode && challengeLevel>unlockedLevel) return;
    reset(); continueUsed=false; pendingDeathSnapshot=null; reviveShieldUntil=0;
    unlockAchievement('first_flight','FIRST FLIGHT');
    state='playing'; retryBtn.textContent='Rise Again';
    const overTitle=overScreen.querySelector('.gameover-title'); if(overTitle) overTitle.textContent='The Darkness Won';
    hud.classList.remove('menu-mode'); startScreen.classList.add('hidden'); overScreen.classList.add('hidden');
    continueBox.classList.add('hidden'); finalGameActions.classList.remove('hidden'); startMusic();
  }
  function finalizeGameOver(){
    continueBox.classList.add('hidden'); finalGameActions.classList.remove('hidden');
  }
  function gameOver(){
    if(state==='over') return;
    state='over'; challengeProgress.classList.add('hidden');
    const overTitle=overScreen.querySelector('.gameover-title'); if(overTitle) overTitle.textContent='The Darkness Won';
    if(score > bestScore){ bestScore = score; localStorage.setItem('ghostFlightBest', Math.floor(bestScore)); syncGlobalScore(); }
    const si=Math.floor(score); if(si>=1)unlockAchievement('first_point','FIRST POINT'); [10,25,50,100].forEach(n=>{if(si>=n)unlockAchievement('score'+n,'SCORE '+n)});
    player.coins += Math.max(1, Math.floor(score/20)); savePlayer();
    finalScoreEl.textContent = Math.floor(score); finalBestEl.textContent = Math.floor(bestScore);
    pendingDeathSnapshot={score,distance,comboCount,comboTimer,elapsed,lastGapCenter};
    overScreen.classList.remove('hidden'); stopMusic(); sfxCrash(); sfxLaugh(); setTimeout(()=>{if(state==='over')speakTaunt()},380);
    if(!challengeMode&&!continueUsed){continueBox.classList.remove('hidden');finalGameActions.classList.add('hidden');}
    else finalizeGameOver();
  }
  function resumeAfterReward(){
    if(!pendingDeathSnapshot||continueUsed)return;
    stopTaunt(); continueUsed=true;
    score=pendingDeathSnapshot.score; distance=pendingDeathSnapshot.distance; comboCount=pendingDeathSnapshot.comboCount; comboTimer=pendingDeathSnapshot.comboTimer; elapsed=pendingDeathSnapshot.elapsed;
    flame.y=H/2; flame.vy=0; pillars=pillars.filter(p=>p.x>flame.x+90); embers=embers.filter(e=>e.x>flame.x+90);
    if(!pillars.length)spawnPillar(W+120); reviveShieldUntil=performance.now()+2000;
    overScreen.classList.add('hidden'); continueBox.classList.add('hidden'); state='countdown'; stopTaunt();
    let n=3; const cd=document.createElement('div'); cd.className='countdown-big'; cd.style.cssText='position:absolute;z-index:110;left:50%;top:42%;transform:translate(-50%,-50%)'; wrap.appendChild(cd);
    const tick=()=>{cd.textContent=n; if(n--<=0){cd.remove();state='playing';lastTime=null;startMusic();}else setTimeout(tick,650)}; tick();
  }
  function update(dt){
    elapsed += dt;
    speed = baseSpeed + Math.min(score/55, 3.4);
    distance += speed;
    score += speed * 0.045;

    // flame physics — always falls, tap makes it rise
    flame.vy += GRAVITY;
    flame.vy = Math.max(MAX_RISE, Math.min(MAX_FALL, flame.vy));
    flame.y += flame.vy;
    flame.angle = Math.max(-0.5, Math.min(0.5, flame.vy * 0.06));

    trail.push({x:flame.x, y:flame.y});
    if(trail.length > 14) trail.shift();

    if(flame.y - flame.r < 0 || flame.y + flame.r > H){
      addParticles(flame.x, flame.y, '#ff6b6b', 14);
      gameOver();
      return;
    }

    // pillars
    for(const p of pillars){
      p.x -= speed;
      if(p.moving){
        p.movePhase += p.moveSpeed * dt;
        p.gapCenter = p.baseGapCenter + Math.sin(p.movePhase) * p.moveAmp;
      }
      if(!p.passed && p.x + PILLAR_W < flame.x - flame.r){
        p.passed = true;
        score += 8;
        comboCount++;
        if(challengeMode){
          challengePassed++; challengeProgress.textContent='LEVEL '+challengeLevel+' • '+challengePassed+'/'+challengeTarget;
          if(challengePassed >= challengeTarget){ completeChallenge(); return; }
        }
        comboTimer = 90;
      }
      // collision
      const withinX = flame.x + flame.r > p.x && flame.x - flame.r < p.x + PILLAR_W;
      if(withinX && performance.now()>=reviveShieldUntil){
        const topEdge = p.gapCenter - p.gap/2;
        const botEdge = p.gapCenter + p.gap/2;
        if(flame.y - flame.r < topEdge || flame.y + flame.r > botEdge){
          addParticles(flame.x, flame.y, '#ff6b6b', 16);
          gameOver();
          return;
        }
      }
    }
    pillars = pillars.filter(p => p.x + PILLAR_W > -20);

    // embers
    for(const e of embers){
      e.x -= speed;
      e.pulse += 0.15;
      if(!e.collected){
        const dx = flame.x - e.x, dy = flame.y - e.y;
        if(Math.sqrt(dx*dx+dy*dy) < flame.r + e.r + 4){
          e.collected = true;
          score += 15;
          comboCount++;
          comboTimer = 90;
          addParticles(e.x, e.y, '#9df0c9', 10);
          sfxEmber();
        }
      }
    }
    embers = embers.filter(e => e.x > -20 && !e.collected);

    // combo timer
    if(comboTimer > 0){
      comboTimer--;
      if(comboTimer === 0) comboCount = 0;
    }

    // spawn new pillars
    spawnTimer -= speed;
    if(spawnTimer <= 0){
      const lastX = pillars.length ? pillars[pillars.length-1].x : W;
      // Mobile-only wider gameplay visibility: tighter horizontal world spacing plus
      // the ghost is positioned farther left, so the current pipe and next ~2 pipes
      // can be read ahead. Desktop and challenge spacing stay unchanged.
      const spacing=challengeMode?levelConfig(challengeLevel).spacing:(IS_MOBILE_GAME?280:340);
      spawnPillar(Math.max(lastX + spacing, W + 20));
      spawnTimer = spacing;
    }

    // particles
    for(const pt of particles){
      pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.035;
    }
    particles = particles.filter(pt => pt.life > 0);
  }

  let lightningFlash = 0;
  function drawBackgroundDecor(){
    const stage = getStage(score);

    // pale glowing moon, dims as weather worsens
    ctx.save();
    const moonX = W * 0.72, moonY = H * 0.2;
    const moonAlpha = stage >= 2 ? 0.15 : 0.35;
    const glow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 95);
    glow.addColorStop(0, `rgba(210,230,225,${moonAlpha})`);
    glow.addColorStop(1, 'rgba(210,230,225,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(moonX-95, moonY-95, 190, 190);
    if(stage < 2){
      ctx.fillStyle = '#dfeee8';
      ctx.beginPath();
      ctx.arc(moonX, moonY, 30, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(150,175,168,0.4)';
      ctx.beginPath(); ctx.arc(moonX-9, moonY-6, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(moonX+7, moonY+8, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // far graveyard hill silhouette (slow parallax) — wind speeds up parallax at higher stages
    const windMul = 1 + stage*0.4;
    ctx.save();
    ctx.fillStyle = 'rgba(10,22,20,0.6)';
    const offset1 = (distance*0.12*windMul) % (W+160);
    drawHillRow(offset1, H*0.7, 100, 30);
    ctx.restore();

    // near graveyard hill with tombstone silhouettes (faster parallax)
    ctx.save();
    ctx.fillStyle = 'rgba(6,14,13,0.8)';
    const offset2 = (distance*0.28*windMul) % (W+160);
    drawHillRow(offset2, H*0.83, 110, 40);
    for(let i=0;i<6;i++){
      const tx = (i*140 - offset2*1.4) % (W+200) - 100;
      const ty = H*0.83 - 8;
      ctx.fillRect(tx, ty-22, 16, 22);
      ctx.beginPath();
      ctx.arc(tx+8, ty-22, 8, Math.PI, 0);
      ctx.fill();
    }
    ctx.restore();

    // drifting fog band — thickens with stage
    ctx.save();
    ctx.globalAlpha = 0.14 + stage*0.06;
    const fogOffset = (distance*0.2*windMul) % (W+300);
    const fogGrad = ctx.createLinearGradient(0, H*0.72, 0, H*0.95);
    fogGrad.addColorStop(0, 'rgba(180,210,200,0)');
    fogGrad.addColorStop(1, 'rgba(180,210,200,0.6)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(-150 - fogOffset + W, H*0.7, 300, H*0.3);
    ctx.fillRect(-150 - fogOffset, H*0.7, 300, H*0.3);
    ctx.restore();

    // sparse cold stars, fade out once rain/storm rolls in
    if(stage < 2){
      ctx.save();
      ctx.globalAlpha = 0.35;
      for(let i=0;i<12;i++){
        const sx = (i*137 + (distance*0.05)) % (W+40) - 20;
        const sy = (i*41) % (H*0.35);
        ctx.fillStyle = '#dfeee8';
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.restore();
    }

    // rain, from stage 2 onward, heavier at stage 3
    if(stage >= 2){
      ctx.save();
      ctx.strokeStyle = stage >= 3 ? 'rgba(200,220,230,0.55)' : 'rgba(200,220,230,0.35)';
      ctx.lineWidth = 1.4;
      const dropCount = stage >= 3 ? 40 : 22;
      const dropSpeed = stage >= 3 ? 1.6 : 1.1;
      for(let i=0;i<dropCount;i++){
        const rx = (i*53 + (distance*dropSpeed)) % (W+40) - 20;
        const ry = (i*97 + (distance*dropSpeed*2)) % (H+40) - 20;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(rx - 6, ry + 14);
        ctx.stroke();
      }
      ctx.restore();
    }

    // storm: occasional lightning flash overlay
    if(stage >= 3){
      if(Math.random() < 0.006) lightningFlash = 1;
      if(lightningFlash > 0){
        ctx.save();
        ctx.globalAlpha = lightningFlash * 0.5;
        ctx.fillStyle = '#eaf6ff';
        ctx.fillRect(0,0,W,H);
        ctx.restore();
        lightningFlash -= 0.12;
        if(lightningFlash < 0) lightningFlash = 0;
      }
    }
  }

  function drawHillRow(offset, baseY, hillW, hillH){
    ctx.beginPath();
    ctx.moveTo(-160 - offset, H);
    for(let x = -160; x < W + 160; x += hillW){
      const px = x - offset;
      ctx.quadraticCurveTo(px + hillW/2, baseY - hillH, px + hillW, baseY);
    }
    ctx.lineTo(W + 160 - offset, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawPillar(p){
    const topEdge = p.gapCenter - p.gap/2;
    const botEdge = p.gapCenter + p.gap/2;
    const grad = ctx.createLinearGradient(p.x,0,p.x+PILLAR_W,0);
    grad.addColorStop(0, '#1e2622');
    grad.addColorStop(0.15, '#3a4a42');
    grad.addColorStop(0.5, '#4c5f56');
    grad.addColorStop(0.85, '#2a3530');
    grad.addColorStop(1, '#1a221e');
    ctx.fillStyle = grad;
    // top stone pillar
    ctx.fillRect(p.x, 0, PILLAR_W, topEdge);
    ctx.fillRect(p.x - 6, topEdge - 14, PILLAR_W + 12, 14);
    // bottom stone pillar
    ctx.fillRect(p.x, botEdge, PILLAR_W, H - botEdge);
    ctx.fillRect(p.x - 6, botEdge, PILLAR_W + 12, 14);

    // crack texture — a few deterministic hairline cracks per pillar (seeded by x)
    ctx.save();
    ctx.strokeStyle = 'rgba(10,16,14,0.45)';
    ctx.lineWidth = 1;
    const seed = ((Math.floor(p.x/37) % 5) + 5) % 5;
    const crackSets = [
      [[0.3,0.1,0.45,0.35],[0.7,0.5,0.55,0.8]],
      [[0.2,0.6,0.4,0.9]],
      [[0.6,0.15,0.5,0.4],[0.35,0.55,0.5,0.75]],
      [[0.15,0.3,0.3,0.6]],
      [[0.55,0.2,0.65,0.5],[0.3,0.7,0.45,0.95]]
    ];
    for(const seg of crackSets[seed]){
      ctx.beginPath();
      ctx.moveTo(p.x + seg[0]*PILLAR_W, seg[1]*topEdge);
      ctx.lineTo(p.x + seg[2]*PILLAR_W, seg[3]*topEdge);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x + seg[0]*PILLAR_W, botEdge + seg[1]*(H-botEdge));
      ctx.lineTo(p.x + seg[2]*PILLAR_W, botEdge + seg[3]*(H-botEdge));
      ctx.stroke();
    }
    ctx.restore();

    // mossy glow trim
    ctx.fillStyle = 'rgba(140,200,170,0.4)';
    ctx.fillRect(p.x, topEdge - 3, PILLAR_W, 2);
    ctx.fillRect(p.x, botEdge + 1, PILLAR_W, 2);
  }

  function drawEmber(e){
    if(e.collected) return;
    const pulse = 1 + Math.sin(e.pulse)*0.18;
    ctx.save();
    ctx.shadowColor = '#9df0c9';
    ctx.shadowBlur = 14;
    const g = ctx.createRadialGradient(e.x - e.r*0.3, e.y - e.r*0.3, 0, e.x, e.y, e.r*pulse*1.3);
    g.addColorStop(0, '#f4fff9');
    g.addColorStop(0.5, '#9df0c9');
    g.addColorStop(1, '#3f8a6b');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r*pulse, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function currentSkinTheme(){
    const id=player.skin;
    const themes={
      mint:['#ffffff','#b6f7d8','#5fb894','#b6f7d8','common'],
      violet:['#fff8ff','#d5a6ff','#7546a6','#d5a6ff','common'],
      pumpkin:['#fff4d8','#ffad4d','#a84c1f','#ffad4d','common'],
      fire:['#fff6b8','#ff8a3d','#a51f16','#ff5b2e','rare'],
      ice:['#ffffff','#9eeeff','#3b79c9','#7eeaff','rare'],
      shadow:['#b7a7d8','#46385f','#130f22','#7f68a8','rare'],
      toxic:['#efffc2','#9cff3f','#287c35','#8dff4f','rare'],
      storm:['#ffffff','#8dd7ff','#5145d6','#b28cff','epic'],
      galaxy:['#fff','#cf8cff','#25104f','#7ee8ff','epic'],
      crystal:['#fff','#b8ffff','#4c77a8','#e5b8ff','epic'],
      royal:['#fffbd6','#ffd76b','#7f3d00','#fff09a','legendary']
    }; return themes[id]||themes.mint;
  }
  function drawSkinAura(theme){
    const rarity=theme[4]; if(rarity==='common')return;
    const count=rarity==='legendary'?7:rarity==='epic'?4:2;
    ctx.save();
    for(let i=0;i<count;i++){const a=elapsed*.035+i*6.283/count;const rr=flame.r*(1.4+(i%2)*.25);ctx.globalAlpha=.35;ctx.fillStyle=theme[3];ctx.beginPath();ctx.arc(flame.x+Math.cos(a)*rr,flame.y+Math.sin(a)*rr,rarity==='legendary'?2.4:1.8,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  function drawFlame(){
    const skinTheme=currentSkinTheme(); drawSkinAura(skinTheme);
    // trail
    for(let i=0;i<trail.length;i++){
      const t = trail[i];
      const a = (i/trail.length) * 0.3;
      ctx.globalAlpha=a; ctx.fillStyle = skinTheme[3];
      ctx.beginPath();
      ctx.arc(t.x, t.y, flame.r * (i/trail.length) * 0.7, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.save();
    ctx.translate(flame.x, flame.y);
    ctx.rotate(flame.angle);
    ctx.shadowColor = skinTheme[3];
    ctx.shadowBlur = skinTheme[4]==='legendary'?28:skinTheme[4]==='epic'?24:20;

    const r = flame.r;
    // ghost body: rounded dome top + wavy trailing bottom
    ctx.beginPath();
    ctx.moveTo(-r, r*0.6);
    ctx.arc(0, 0, r, Math.PI, 0); // dome top
    ctx.lineTo(r, r*0.6);
    // wavy bottom edge (3 scallops)
    const waveAmp = 4;
    ctx.quadraticCurveTo(r*0.66, r*0.9 + waveAmp, r*0.33, r*0.65);
    ctx.quadraticCurveTo(0, r*0.9 + waveAmp, -r*0.33, r*0.65);
    ctx.quadraticCurveTo(-r*0.66, r*0.9 + waveAmp, -r, r*0.6);
    ctx.closePath();

    // volumetric body shading — radial highlight instead of flat linear gradient
    const bodyGrad = ctx.createRadialGradient(-r*0.3, -r*0.35, r*0.1, 0, 0, r*1.4);
    bodyGrad.addColorStop(0, skinTheme[0]);
    bodyGrad.addColorStop(0.35, skinTheme[0]);
    bodyGrad.addColorStop(0.7, skinTheme[1]);
    bodyGrad.addColorStop(1, skinTheme[2]);
    ctx.fillStyle = bodyGrad;
    ctx.globalAlpha = 0.93;
    ctx.fill();
    ctx.globalAlpha = 1;

    // soft rim light along the left edge (cool backlight feel)
    ctx.save();
    ctx.clip();
    ctx.shadowBlur = 0;
    const rim = ctx.createLinearGradient(-r, 0, -r*0.4, 0);
    rim.addColorStop(0, 'rgba(255,255,255,0.55)');
    rim.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rim;
    ctx.fillRect(-r*1.3, -r*1.3, r*1, r*2.6);
    // subtle under-shadow near the wavy hem for volume
    const hemShade = ctx.createLinearGradient(0, r*0.3, 0, r*1.1);
    hemShade.addColorStop(0, 'rgba(20,50,40,0)');
    hemShade.addColorStop(1, 'rgba(20,50,40,0.35)');
    ctx.fillStyle = hemShade;
    ctx.fillRect(-r*1.3, r*0.2, r*2.6, r*1.1);
    ctx.restore();

    // eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#12241f';
    ctx.beginPath();
    ctx.ellipse(-r*0.32, -r*0.08, 2.6, 3.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r*0.32, -r*0.08, 2.6, 3.6, 0, 0, Math.PI*2);
    ctx.fill();
    // tiny eye highlight for life-like glint
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(-r*0.32+0.8, -r*0.08-1, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.32+0.8, -r*0.08-1, 0.8, 0, Math.PI*2); ctx.fill();
    // faint mouth
    ctx.strokeStyle = 'rgba(18,36,31,0.5)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(0, r*0.18, 3.5, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();

    ctx.restore();

    // soft contact shadow beneath the ghost, grounds it against the scene
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(flame.x, flame.y + r*1.5, r*0.9, r*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles(){
    for(const pt of particles){
      ctx.globalAlpha = Math.max(pt.life,0);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  let vignetteGrad = null, vignetteW = 0, vignetteH = 0;
  function getVignette(){
    if(vignetteGrad && vignetteW === W && vignetteH === H) return vignetteGrad;
    vignetteW = W; vignetteH = H;
    const g = ctx.createRadialGradient(W/2, H/2, H*0.35, W/2, H/2, H*0.85);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.45)');
    vignetteGrad = g;
    return g;
  }
  function drawVignetteAndGrain(){
    ctx.save();
    ctx.fillStyle = getVignette();
    ctx.fillRect(0,0,W,H);
    ctx.restore();
    // light film grain — sparse, cheap, redrawn each frame for a subtle flicker
    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#ffffff';
    for(let i=0;i<24;i++){
      const gx = Math.random()*W, gy = Math.random()*H;
      ctx.fillRect(gx, gy, 1, 1);
    }
    ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawBackgroundDecor();
    const stage = getStage(score);
    if(stage >= 1){
      ctx.save();
      ctx.fillStyle = `rgba(2,6,8,${0.08 + stage*0.07})`;
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
    for(const p of pillars) drawPillar(p);
    for(const e of embers) drawEmber(e);
    drawFlame();
    drawParticles();
    drawVignetteAndGrain();
  }

  function updateHUD(){
    scoreEl.textContent = Math.floor(score);
    bestEl.textContent = 'Best: ' + Math.floor(bestScore);
    if(comboCount >= 3){
      comboEl.style.opacity = '1';
      comboEl.textContent = comboCount + 'x combo!';
    } else {
      comboEl.style.opacity = '0';
    }
  }

  let lastTime = null;
  function loop(ts){
    if(lastTime === null) lastTime = ts;
    const dt = Math.min((ts - lastTime)/16.67, 2.2);
    lastTime = ts;

    if(state === 'playing' && !paused){
      update(dt);
    }
    render();
    updateHUD();
    requestAnimationFrame(loop);
  }

  // input
  function handleInput(e){
    if(e.type === 'keydown' && e.code !== 'Space') return;
    if(e.target && (e.target.closest('#settingsPanel') || e.target.closest('#settingsBtn'))) return;
    e.preventDefault();
    flap();
  }
  window.addEventListener('keydown', handleInput, {passive:false});
  let lastInputTime = 0;
  function handleInputDedup(e){
    const now = performance.now();
    if(now - lastInputTime < 80) return; // dedupe pointerdown+touchstart firing for the same physical tap
    lastInputTime = now;
    handleInput(e);
  }
  canvas.addEventListener('pointerdown', handleInputDedup, {passive:false});
  canvas.addEventListener('touchstart', handleInputDedup, {passive:false});
  canvas.addEventListener('mousedown', handleInputDedup, {passive:false});
  if(startBtn) startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', ()=>{ stopTaunt(); if(challengeMode && state==='over' && challengeLevel<50 && finalBestEl.textContent==='COMPLETE'){challengeLevel=Math.min(50,challengeLevel+1);} startGame(); });
  continueAdBtn.addEventListener('click',(e)=>{e.stopPropagation();stopTaunt();showRewardedAd('continue_game',resumeAfterReward,()=>openPanel('REWARDED AD UNAVAILABLE','<div style="font-size:48px">📡</div><div class="small-label">Rewarded ad unavailable. Please try again later.</div>'));});
  skipContinueBtn.addEventListener('click',(e)=>{e.stopPropagation();stopTaunt();finalizeGameOver();});

  exitBtn.addEventListener('click', ()=>{
    stopTaunt(); state = 'start';
    overScreen.classList.add('hidden');
    startScreen.classList.remove('hidden');
    hud.classList.add('menu-mode');
    challengeMode = false;
    challengeProgress.classList.add('hidden');
  });

  settingsBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    initAudio();
    paused = true;
    if(audio.musicTimer) stopMusic(); // pause the music schedule too, resumed on close
    settingsPanel.classList.remove('hidden');
  });
  closeSettingsBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    settingsPanel.classList.add('hidden');
    paused = false;
    lastTime = null; // avoid a huge dt spike on the next frame after being paused
    if(state === 'playing' && audio.musicOn) startMusic();
  });
  musicToggle.addEventListener('change', ()=>{
    audio.musicOn = musicToggle.checked; localStorage.setItem('ghostFlightMusicOn',audio.musicOn?'1':'0');
    if(audio.musicOn && state === 'playing') startMusic();
    else stopMusic();
  });
  musicVol.addEventListener('input', ()=>{
    initAudio();
    audio.musicGain.gain.value = musicVol.value / 100 * 0.7;
  });
  sfxToggle.addEventListener('change', ()=>{
    audio.sfxOn = sfxToggle.checked; localStorage.setItem('ghostFlightSfxOn',audio.sfxOn?'1':'0'); if(!audio.sfxOn)stopTaunt();
  });
  sfxVol.addEventListener('input', ()=>{
    initAudio();
    audio.sfxGain.gain.value = sfxVol.value / 100;
  });


  profileBtn.textContent = player.avatar;
  playHot.addEventListener('click', ()=>{ tapFx(playHot); challengeMode=false; startGame(); });
  challengeHot.addEventListener('click', ()=>{ tapFx(challengeHot); openChallengeLevels(); });
  profileBtn.addEventListener('click', (e)=>{ e.stopPropagation(); openProfile(); });
  skinsHot.addEventListener('click', ()=>openSkins());
  leaderHot.addEventListener('click', ()=>openLeaderboard());
  shopHot.addEventListener('click', ()=>openShop());
  rateHot.addEventListener('click', ()=>openPanel('RATE GHOST FLIGHT','<div style="font-size:52px">⭐⭐⭐⭐⭐</div><p style="margin-top:12px;color:#cfe5df">Thanks for playing! Add your Play Store/App Store URL here when the game is published.</p>'));
  shareHot.addEventListener('click', async ()=>{
    const publicGameUrl = (location.protocol==='http:' || location.protocol==='https:') ? location.href : '';
    const text='Fly. Avoid. Survive. Can you beat my Ghost Flight score of '+Math.floor(bestScore)+'?';
    const data={title:'Ghost Flight',text:text,url:publicGameUrl || undefined};
    try{
      if(navigator.share) await navigator.share(data);
      else { await navigator.clipboard.writeText(text+(publicGameUrl?' '+publicGameUrl:'')); openPanel('SHARE GHOST FLIGHT','<div style="font-size:48px">✅</div><div style="font-weight:800">GAME LINK COPIED</div>'); }
    } catch(e){}
  });
  menuPanel.addEventListener('click', e=>{ if(e.target===menuPanel) closeMenuPanel(); });
  window.addEventListener('online', ()=>syncGlobalScore());
  document.addEventListener('visibilitychange',()=>{if(document.hidden){stopTaunt();if(state==='playing')paused=true;}else if(state==='playing'){paused=false;lastTime=null;}});
  setInterval(validateSelectedSkin,60000); validateSelectedSkin();
  firebaseReady.then(()=>syncGlobalScore());
  setTimeout(()=>loadingScreen.classList.add('hidden'), 1850);

  // init idle flame preview on start screen
  flame = { x: W*FLAME_X_RATIO, y: H/2, r:15, vy:0, angle:0 };
  trail = [];
  pillars = []; embers = []; particles = [];
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
